<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Hermes Agent - 提示词仿真与评估系统</title>
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <main class="shell">
      <section class="panel controls">
        <div>
          <p class="eyebrow">Hermes Agent</p>
          <h1>提示词评估模拟器</h1>
        </div>

        <form id="harness-form">
          <label>
            任务文档内容
            <textarea name="text" rows="10" placeholder="在此粘贴您的训练任务大纲、人设描述文件或评估目标文档..."></textarea>
          </label>

          <label>
            上传任务文档
            <input name="document" type="file" accept=".txt,.md,.json,.csv,.docx,.pdf" />
          </label>

          <label>
            模拟学生人设
            <select name="student_persona">
              <option value="auto">自动选择人设</option>
              <option value="注意力分散的初学者 (经常答非所问，偏离主题)。">注意力分散的初学者</option>
              <option value="积极的主动学习者 (有基础理解，但缺乏实操经验)。">积极的主动学习者</option>
              <option value="持怀疑态度的务实学生 (要求具体实例与逻辑论证)。">持怀疑态度的务实学生</option>
            </select>
          </label>

          <label>
            阶段跳转标识词 (跳档词)
            <input name="transition_word" type="text" value="下个阶段" placeholder="当阶段目标达成，智能体纯净输出此词将触发阶段跳转..." required />
          </label>

          <div class="form-row-2">
            <label>
              阶段建议轮次
              <input name="suggested_rounds" type="number" min="1" max="10" value="3" required />
            </label>
            <label>
              最大限制轮次
              <input name="max_rounds_per_stage" type="number" min="2" max="20" value="5" required />
            </label>
          </div>

          <label>
            评估合格分数线
            <input name="threshold" type="range" min="60" max="95" value="85" />
            <span id="threshold-value">85</span>
          </label>

          <button type="submit">开始生成提示词并仿真评估</button>
        </form>
      </section>

      <section class="panel conversation">
        <div class="section-head">
          <div>
            <p class="eyebrow">智能体沙箱</p>
            <h2>模拟对话仿真回放</h2>
          </div>
          <span id="provider-pill">空闲</span>
        </div>
        <div id="chat-log" class="chat-log">
          <div class="empty">请启动仿真评估，以观察培训导师（Trainer）与模拟学生之间的多轮对答细节。</div>
        </div>
      </section>

      <section class="panel report">
        <div class="section-head">
          <div>
            <p class="eyebrow">智能评估器</p>
            <h2>评分与自愈优化</h2>
          </div>
          <div id="score" class="score">--</div>
        </div>

        <div id="dimensions" class="dimensions"></div>

        <div class="report-block">
          <h3>当前仿真采用的测试学生人设</h3>
          <div id="student-persona-display" class="persona-box">等待输入...</div>
        </div>

        <div class="report-block">
          <div class="block-header">
            <h3>初始生成的导师提示词 (Initial Prompt)</h3>
            <button type="button" class="copy-btn" onclick="copyText('initial-prompt', this)">复制提示词</button>
          </div>
          <pre id="initial-prompt" class="prompt-box">等待生成...</pre>
        </div>

        <div class="report-block">
          <h3>评估诊断与优化建议</h3>
          <ul id="diagnosis"></ul>
        </div>

        <div class="report-block">
          <div class="block-header">
            <h3>最终优化后的合格提示词 (Final Prompt)</h3>
            <button type="button" class="copy-btn" onclick="copyText('final-prompt', this)">复制提示词</button>
          </div>
          <pre id="final-prompt" class="prompt-box">等待优化...</pre>
        </div>
      </section>
    </main>

    <script src="/static/app.js"></script>
  </body>
</html>
